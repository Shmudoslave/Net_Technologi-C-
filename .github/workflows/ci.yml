name: C++ CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install g++
    - run: sudo apt-get update && sudo apt-get install -y g++

    - name: Compile main.cpp
    - run: g++ -Wall -Wextra main.cpp -o main

    - name: Run main.cpp (Connect test)
    - run: ./main 

    